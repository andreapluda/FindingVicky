<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finding Vicky — Mappa degli adesivi</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Finding <span>Vicky</span></h1>
  <button id="btn-add-pin">+ Aggiungi adesivo</button>
</header>

<div id="map"></div>

<!-- ── Add-pin modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Chiudi">×</button>
    <h2>Segnala un adesivo</h2>

    <div id="photo-drop">
      <input type="file" id="photo-input" accept="image/*">
      📷 Trascina qui la foto oppure clicca per selezionarla<br>
      <small style="color:var(--text-muted)">La posizione verrà estratta automaticamente se disponibile</small>
    </div>
    <img id="photo-preview" alt="Anteprima foto">

    <form id="pin-form">
      <div class="exif-badge" id="exif-badge" style="display:none"></div>

      <div class="coords-row">
        <div class="form-group">
          <label for="lat">Latitudine</label>
          <input type="number" id="lat" step="0.000001" placeholder="es. 45.464664" required>
        </div>
        <div class="form-group">
          <label for="lng">Longitudine</label>
          <input type="number" id="lng" step="0.000001" placeholder="es. 9.188540" required>
        </div>
      </div>

      <div class="form-group" style="margin-top:-8px;margin-bottom:16px">
        <button type="button" id="btn-geolocate" style="
          background:none;border:1px solid var(--surface2);
          color:var(--text-muted);padding:6px 14px;border-radius:6px;
          cursor:pointer;font-size:0.82rem;
        ">📍 Usa la mia posizione attuale</button>
      </div>

      <div class="form-group">
        <label for="location-name">Luogo (opzionale)</label>
        <input type="text" id="location-name" placeholder="es. Via Torino, Milano">
      </div>

      <div class="form-group">
        <label for="taken-at">Data e ora</label>
        <input type="datetime-local" id="taken-at">
      </div>

      <div class="form-group">
        <label for="username">Il tuo nome / nickname *</label>
        <input type="text" id="username" placeholder="es. marco_stickers" maxlength="50" required>
      </div>

      <div class="form-group">
        <label for="note">Note (opzionale)</label>
        <textarea id="note" placeholder="Dove si trova esattamente l'adesivo?" maxlength="300"></textarea>
      </div>

      <button type="submit" id="btn-submit">Invia segnalazione</button>
    </form>
  </div>
</div>

<div id="toast"></div>

<!-- Supabase config (fill in your values) -->
<script src="supabase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
