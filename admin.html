<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Finding Vicky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #e63946; --bg: #1a1a2e; --surface: #16213e;
      --surface2: #0f3460; --text: #eaeaea; --text-muted: #9ca3af;
      --green: #4ade80; --red: #ef4444; --radius: 10px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    header { background: var(--surface); padding: 14px 24px; border-bottom: 1px solid var(--surface2); display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.1rem; color: var(--accent); }
    #header-right { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: var(--text-muted); }
    #btn-logout { background: none; border: 1px solid var(--surface2); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    #btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* Login wall */
    #login-wall { display: flex; align-items: center; justify-content: center; min-height: calc(100dvh - 56px); }
    #login-box { background: var(--surface); border: 1px solid var(--surface2); border-radius: var(--radius); padding: 32px 28px; width: 320px; }
    #login-box h2 { margin-bottom: 18px; font-size: 1rem; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--surface2); border-radius: 6px; padding: 10px 12px; color: var(--text); font-size: 0.95rem; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    #btn-login { width: 100%; background: var(--accent); color: #fff; border: none; padding: 11px; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
    #btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    #login-error { font-size: 0.82rem; color: var(--red); margin-top: 10px; display: none; }

    /* Cards */
    #admin-panel { display: none; padding: 24px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--surface2); border-radius: var(--radius); overflow: hidden; }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .card.is-mobile { border-color: rgba(244,162,97,0.4); }
    .card.is-mobile img { border-top: 3px solid #f4a261; }
    .mobile-badge { display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:600;color:#f4a261;background:rgba(244,162,97,0.12);border:1px solid rgba(244,162,97,0.3);border-radius:20px;padding:2px 9px;margin-bottom:6px; }
    .card-body { padding: 14px; }
    .card-meta { font-size: 0.82rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
    .card-meta strong { color: var(--text); }
    .card-actions { display: flex; gap: 8px; }
    .btn-approve { flex: 1; background: rgba(74,222,128,0.15); border: 1px solid var(--green); color: var(--green); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: background 0.2s; }
    .btn-approve:hover { background: rgba(74,222,128,0.3); }
    .btn-reject { flex: 1; background: rgba(239,68,68,0.12); border: 1px solid var(--red); color: var(--red); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: background 0.2s; }
    .btn-reject:hover { background: rgba(239,68,68,0.25); }
    .empty { color: var(--text-muted); text-align: center; padding: 60px 20px; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--surface2); color: var(--text); padding: 10px 20px; border-radius: 30px; font-size: 0.88rem; z-index: 999; transition: transform 0.3s; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>

<header>
  <h1>Finding Vicky — Admin</h1>
  <div id="header-right">
    <span id="pending-count"></span>
    <button id="btn-logout" style="display:none">Esci</button>
  </div>
</header>

<div id="login-wall">
  <div id="login-box">
    <h2>Accesso admin</h2>
    <div class="form-group">
      <label for="email-input">Email</label>
      <input type="email" id="email-input" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="pw-input">Password</label>
      <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="btn-login">Accedi</button>
    <p id="login-error"></p>
  </div>
</div>

<div id="admin-panel">
  <div class="cards" id="cards-container">
    <p class="empty">Caricamento…</p>
  </div>
</div>

<div id="toast"></div>

<script src="supabase-config.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── Check existing session ──
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showAdminPanel(session.user.email);

  // ── Login ──
  const btnLogin  = document.getElementById('btn-login');
  const loginErr  = document.getElementById('login-error');

  btnLogin.addEventListener('click', tryLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  async function tryLogin() {
    const email = document.getElementById('email-input').value.trim();
    const pw    = document.getElementById('pw-input').value;
    btnLogin.disabled = true;
    btnLogin.textContent = 'Accesso…';
    loginErr.style.display = 'none';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });

    if (error) {
      loginErr.textContent = 'Credenziali non valide.';
      loginErr.style.display = 'block';
      btnLogin.disabled = false;
      btnLogin.textContent = 'Accedi';
    } else {
      showAdminPanel(data.user.email);
    }
  }

  function showAdminPanel(email) {
    document.getElementById('login-wall').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('btn-logout').style.display = 'inline-block';
    document.getElementById('header-right').insertAdjacentHTML('afterbegin',
      `<span style="font-size:0.8rem">${esc(email)}</span>`);
    loadPending();
  }

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    location.reload();
  });

  // ── Load pending ──
  async function loadPending() {
    const { data, error } = await supabase
      .from('pins')
      .select('*')
      .eq('approved', false)
      .order('created_at', { ascending: true });

    const container = document.getElementById('cards-container');
    if (error) { container.innerHTML = `<p class="empty">Errore: ${error.message}</p>`; return; }
    if (!data.length) {
      container.innerHTML = '<p class="empty">Nessuna segnalazione in attesa ✓</p>';
      document.getElementById('pending-count').textContent = '';
      return;
    }
    document.getElementById('pending-count').textContent = `${data.length} in attesa`;
    container.innerHTML = '';
    data.forEach(pin => container.appendChild(buildCard(pin)));
  }

  function buildCard(pin) {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${pin.id}`;

    const photoHtml = pin.photo_url
      ? `<img src="${pin.photo_url}" alt="foto" loading="lazy">`
      : `<div style="height:80px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.8rem;">Nessuna foto</div>`;

    const date = pin.taken_at ? new Date(pin.taken_at).toLocaleString('it-IT') : '—';
    if (pin.is_mobile) card.classList.add('is-mobile');

    const mobileBadge = pin.is_mobile
      ? `<div class="mobile-badge">In movimento · ${esc(MOBILE_LABELS[pin.mobile_type] ?? pin.mobile_type ?? 'Veicolo')}</div>`
      : '';

    card.innerHTML = `
      ${photoHtml}
      <div class="card-body">
        <div class="card-meta">
          ${mobileBadge}
          <strong>${esc(pin.username || 'Anonimo')}</strong><br>
          📍 ${pin.lat.toFixed(5)}, ${pin.lng.toFixed(5)}<br>
          ${pin.location_name ? `📌 ${esc(pin.location_name)}<br>` : ''}
          🕐 ${date}<br>
          ${pin.note ? `💬 ${esc(pin.note)}<br>` : ''}
          <span style="font-size:0.75rem;color:var(--text-muted)">Inviato: ${new Date(pin.created_at).toLocaleString('it-IT')}</span>
        </div>
        <div class="card-actions">
          <button class="btn-approve">✓ Approva</button>
          <button class="btn-reject">✕ Rifiuta</button>
        </div>
      </div>`;

    card.querySelector('.btn-approve').addEventListener('click', () => moderatePin(pin.id, true,  pin.photo_url));
    card.querySelector('.btn-reject').addEventListener('click',  () => moderatePin(pin.id, false, pin.photo_url));
    return card;
  }

  async function moderatePin(id, approve, photoUrl) {
    if (approve) {
      const { error } = await supabase.from('pins').update({ approved: true }).eq('id', id);
      if (error) { showToast('Errore: ' + error.message, 'error'); return; }
      showToast('Pin approvato!', 'success');
    } else {
      if (!confirm('Eliminare definitivamente questa segnalazione?')) return;
      const { error } = await supabase.from('pins').delete().eq('id', id);
      if (error) { showToast('Errore: ' + error.message, 'error'); return; }
      if (photoUrl) {
        const path = photoUrl.split('/object/public/photos/')[1];
        if (path) await supabase.storage.from('photos').remove([path]);
      }
      showToast('Segnalazione eliminata', '');
    }
    document.getElementById(`card-${id}`)?.remove();
    const remaining = document.querySelectorAll('.card').length;
    if (!remaining) {
      document.getElementById('cards-container').innerHTML = '<p class="empty">Nessuna segnalazione in attesa ✓</p>';
      document.getElementById('pending-count').textContent = '';
    } else {
      document.getElementById('pending-count').textContent = `${remaining} in attesa`;
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 3200);
  }

  const MOBILE_LABELS = {
    auto: '🚗 Auto / Moto / Furgone', bici: '🚲 Bicicletta / Monopattino',
    camion: '🚛 Camion / TIR', bus: '🚌 Bus / Pullman', treno: '🚆 Treno / Metro',
    nave: '⛵ Nave / Barca', aereo: '✈️ Aereo', altro: '📦 Altro',
  };

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
